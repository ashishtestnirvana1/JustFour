upstream nextjs_app {
    server app:3000;
    keepalive 64;
}

# Allowed origins — tighten this in production
map $http_origin $cors_origin {
    default "";
    "~^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$" $http_origin;
    "~^https://justfour\.app$"                        $http_origin;
    "~^https://www\.justfour\.app$"                   $http_origin;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options          "DENY"              always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header Referrer-Policy          "strict-origin"     always;
    add_header X-XSS-Protection        "1; mode=block"     always;

    # ── Static assets — long cache ───────────────────────────────────────────
    location /_next/static/ {
        proxy_pass         http://nextjs_app;
        proxy_cache_valid  200 365d;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location /public/ {
        proxy_pass         http://nextjs_app;
        proxy_cache_valid  200 7d;
        add_header         Cache-Control "public, max-age=604800";
    }

    # ── API routes — CORS headers + SSE streaming ────────────────────────────
    location /api/ {
        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age           "86400" always;
            add_header Content-Length 0;
            add_header Content-Type  text/plain;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;

        proxy_pass             http://nextjs_app;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_cache_bypass     $http_upgrade;

        # SSE / streaming — critical for /api/chat
        proxy_buffering        off;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;
        chunked_transfer_encoding on;
    }

    # ── Auth callback ────────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass             http://nextjs_app;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
    }

    # ── All other routes ─────────────────────────────────────────────────────
    location / {
        proxy_pass             http://nextjs_app;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_cache_bypass     $http_upgrade;

        # Reasonable timeout for page loads
        proxy_read_timeout     60s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    gzip              on;
    gzip_comp_level   4;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript;
}
