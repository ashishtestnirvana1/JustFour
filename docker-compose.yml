version: "3.9"

services:
  # ── Next.js app (FE + BE in one process) ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL:      ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL:           ${NEXT_PUBLIC_APP_URL}
    image: justfour-app:latest
    container_name: justfour_app
    restart: unless-stopped
    environment:
      NODE_ENV:                      production
      PORT:                          3000
      HOSTNAME:                      0.0.0.0
      NEXT_PUBLIC_SUPABASE_URL:      ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY:     ${SUPABASE_SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY:             ${ANTHROPIC_API_KEY}
      RESEND_API_KEY:                ${RESEND_API_KEY}
      DATABASE_URL:                  ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL:           ${NEXT_PUBLIC_APP_URL}
    expose:
      - "3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Caddy reverse proxy (automatic HTTPS via Let's Encrypt) ──────────────────
  caddy:
    image: caddy:2-alpine
    container_name: justfour_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # TLS certificates (persisted across restarts)
      - caddy_config:/config  # Caddy config cache
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:   # Persists TLS certs — do NOT delete this volume
  caddy_config:
