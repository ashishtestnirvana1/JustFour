version: "3.9"

services:
  # ── Next.js app (FE + BE in one process) ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL:     ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL:          ${NEXT_PUBLIC_APP_URL}
    image: justfour-app:latest
    container_name: justfour_app
    restart: unless-stopped
    environment:
      NODE_ENV:                     production
      PORT:                         3000
      HOSTNAME:                     0.0.0.0
      NEXT_PUBLIC_SUPABASE_URL:     ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY:    ${SUPABASE_SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY:            ${ANTHROPIC_API_KEY}
      NEXT_PUBLIC_APP_URL:          ${NEXT_PUBLIC_APP_URL}
    expose:
      - "3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx reverse proxy (public-facing, port 80) ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: justfour_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  internal:
    driver: bridge
